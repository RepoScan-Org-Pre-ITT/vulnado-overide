veracode_static_scan:
  use_custom_workflow: vulnado-build
  artifact_file: ./veracode-artifact/veracode-artifact.zip
  profile: build
  push:
    trigger: false
  pull_request:
    trigger: false
    target_branch:
      - default_branch
  issues:
    trigger: true
  analysis_on_platform: true
